name: Release Bridge

# Tag `bridge-v*` (e.g. git tag bridge-v1.0.1 && git push --tags) to build a
# signed + notarized macOS .dmg and attach it to a GitHub Release.
on:
  push:
    tags: ["bridge-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    # `secrets` is not available in step-level `if:` — referencing it there makes
    # GitHub reject the whole workflow at parse time (startup_failure on every
    # run). Hoist the "is signing configured?" check into a job-level env var and
    # gate the signing steps on that instead.
    env:
      HAS_SIGNING_CERT: ${{ secrets.MAC_CERT_P12_BASE64 != '' }}
    defaults:
      run:
        working-directory: bridge-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      # Workspace deps at the repo root so `sync-server` can bundle the bridge's
      # workspace imports (e.g. @litter/transcript) into a self-contained server.mjs.
      - name: Install workspace deps
        working-directory: ${{ github.workspace }}
        run: bun install

      - name: Import signing certificate
        if: ${{ env.HAS_SIGNING_CERT == 'true' }}
        env:
          CERT_P12: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$CERT_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$CERT_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$CERT_PASSWORD" build.keychain
          rm -f /tmp/cert.p12

      - name: Build (signed + notarized)
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEAPIKEYPATH: /tmp/asc_key.p8
          ELECTROBUN_APPLEAPIKEY: ${{ secrets.ELECTROBUN_APPLEAPIKEY }}
          ELECTROBUN_APPLEAPIISSUER: ${{ secrets.ELECTROBUN_APPLEAPIISSUER }}
        run: |
          if [ -n "${{ secrets.ELECTROBUN_APPLEAPIKEY_P8 }}" ]; then
            echo "${{ secrets.ELECTROBUN_APPLEAPIKEY_P8 }}" | base64 --decode > /tmp/asc_key.p8
          fi
          bun run sync-server
          ./node_modules/.bin/electrobun build --env=stable

      # Publish as `v{app-version}` (e.g. v1.0.6) to match releases cut locally by
      # scripts/release-bridge.sh — not the `bridge-v*` trigger tag. Both work for
      # auto-update ("latest non-prerelease"), but this keeps the Releases page
      # consistent regardless of which path built it.
      - name: Resolve app version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Attach installer + auto-update artifacts to the Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Pounce v${{ steps.ver.outputs.version }}
          body: "Signed + notarized macOS build (Apple Silicon). Download Pounce.dmg, open it, drag Pounce to Applications, launch, and scan the QR with the Pounce app. Installs from v1.0.2+ update automatically."
          files: |
            bridge-desktop/artifacts/*.dmg
            bridge-desktop/artifacts/*-update.json
            bridge-desktop/artifacts/*.app.tar.zst
          fail_on_unmatched_files: true
