[package]
name = "litter-iroh"
version = "0.1.0"
edition = "2021"
description = "Embedded Iroh QUIC client for the NitroLitter native module — dials the alleycat daemon and speaks its JSON-RPC protocol."

[lib]
name = "litter_iroh"
# staticlib for iOS linking, cdylib for Android, rlib for host `cargo check`.
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
# Pin to the daemon's iroh version (read from the kittylitter binary).
iroh = "0.98.2"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "io-util", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
once_cell = "1"

# Upstream alleycat is the source of truth — depend on it directly rather than
# vendoring/forking the wire codec. `framing` is `pub` in this crate.
# NOTE: the alleycat `protocol` module (Request/Response/ALLEYCAT_ALPN) is
# currently private (`mod protocol`); see NATIVE.md — needs an upstream `pub`
# to also be consumed instead of wire-conformant JSON built here.
alleycat-bridge-core = { git = "https://github.com/dnakov/alleycat" }
